{% extends "base.html" %}

{% block title %}新規案件作成 - 電気設備積算・見積システム{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h1 class="h2">
            <i class="bi bi-file-plus"></i> 新規案件作成
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="POST" action="/projects/new">
                    <div class="mb-4">
                        <label for="name" class="form-label required">案件名</label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="例: ビルA号館改修工事" required autofocus>
                        <small class="form-text text-muted">案件を識別するための名称を入力してください</small>
                    </div>

                    <div class="mb-4">
                        <label for="client_name" class="form-label">顧客名</label>
                        <input type="text" class="form-control" id="client_name" name="client_name" placeholder="例: 株式会社○○">
                        <small class="form-text text-muted">顧客の会社名または個人名を入力してください</small>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">説明</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="案件の詳細情報や特記事項などを入力してください"></textarea>
                        <small class="form-text text-muted">案件に関する追加情報があれば入力してください</small>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> 作成
                        </button>
                        <a href="/dashboard" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-arrow-left"></i> キャンセル
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h5 class="card-title mb-3">
                    <i class="bi bi-lightbulb"></i> ヒント
                </h5>
                <ul class="small">
                    <li class="mb-2">案件名は後で変更できます</li>
                    <li class="mb-2">顧客情報は省略可能です</li>
                    <li class="mb-2">案件作成後、ファイルをアップロードして見積を開始できます</li>
                    <li>複数の案件を並行して管理できます</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
