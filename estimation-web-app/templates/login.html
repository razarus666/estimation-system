{% extends "base.html" %}

{% block title %}ログイン - 電気設備積算・見積システム{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-100" style="padding-top: 4rem;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-lightning-fill" style="font-size: 2.5rem; color: #1a73e8;"></i>
                    <h3 class="mt-3" style="color: #333;">ログイン</h3>
                </div>

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="email" class="form-label required">メールアドレス</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label required">パスワード</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right"></i> ログイン
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted mb-0">
                        新規登録はこちら: <a href="/register" class="text-decoration-none">登録ページ</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="text-center mt-4 text-muted small">
            <p>© 電気設備積算・見積システム v1.0</p>
        </div>
    </div>
</div>
{% endblock %}
