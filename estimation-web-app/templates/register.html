{% extends "base.html" %}

{% block title %}新規登録 - 電気設備積算・見積システム{% endblock %}

{% block content %}
<div class="row justify-content-center min-vh-100" style="padding-top: 2rem;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill" style="font-size: 2.5rem; color: #1a73e8;"></i>
                    <h3 class="mt-3" style="color: #333;">新規登録</h3>
                </div>

                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="full_name" class="form-label required">氏名(本名)</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label required">メールアドレス</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label required">パスワード</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="mb-4">
                        <label for="password_confirm" class="form-label required">パスワード確認</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                    </div>

                    <div class="alert alert-info" role="alert">
                        <i class="bi bi-info-circle"></i>
                        <strong>重要:</strong> 登録後、管理者の承認を受けてからご利用いただけます。
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-person-check"></i> 登録
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted mb-0">
                        既にアカウントをお持ちですか？ <a href="/login" class="text-decoration-none">ログイン</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="text-center mt-4 text-muted small">
            <p>© 電気設備積算・見積システム v1.0</p>
        </div>
    </div>
</div>
{% endblock %}
