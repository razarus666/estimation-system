{% extends 'base.html' %}

{% block content %}
<div class="container-fluid px-4 py-5">
  <div class="row mb-4">
    <div class="col-md-8">
      <h1 class="h3 mb-0">プロフィール</h1>
    </div>
  </div>

  {% if message %}
  <div class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle me-2"></i>{{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-5">
      <form method="POST" enctype="multipart/form-data">
        <div class="row">
          <div class="col-md-4 text-center mb-4">
            <!-- Avatar Section -->
            <div class="mb-3">
              {% if user[5] %}
              <img src="/uploads/{{ user[5] }}" alt="アバター" class="rounded-circle" style="width: 150px; height: 150px; object-fit: cover;">
              {% else %}
              <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center" style="width: 150px; height: 150px;">
                <i class="bi bi-person-circle" style="font-size: 80px; color: var(--text-secondary);"></i>
              </div>
              {% endif %}
            </div>
            <div class="mb-3">
              <input type="file" id="avatarInput" name="avatar" accept=".png,.jpg,.jpeg,.gif" style="display:none">
              <button type="button" class="btn btn-sm btn-outline-primary" onclick="document.getElementById('avatarInput').click()">
                <i class="bi bi-upload"></i> アバター変更
              </button>
            </div>
          </div>

          <div class="col-md-8">
            <div class="mb-3">
              <label class="form-label fw-600">メールアドレス</label>
              <input type="email" class="form-control" value="{{ user[1] }}" disabled>
              <small class="text-muted">メールアドレスは変更できません</small>
            </div>

            <div class="mb-3">
              <label class="form-label fw-600">氏名</label>
              <input type="text" name="full_name" class="form-control" value="{{ user[2] or '' }}" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-600">電話番号</label>
              <input type="tel" name="phone" class="form-control" value="{{ user[3] or '' }}" placeholder="例: 090-1234-5678">
            </div>

            <div class="mb-3">
              <label class="form-label fw-600">部署</label>
              <input type="text" name="department" class="form-control" value="{{ user[4] or '' }}" placeholder="例: 営業部">
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>保存
              </button>
              <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                キャンセル
              </a>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('avatarInput').addEventListener('change', function(e) {
  if (e.target.files.length === 0) return;

  const formData = new FormData();
  formData.append('avatar', e.target.files[0]);

  fetch('/profile/avatar', {
    method: 'POST',
    body: formData
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      alert('アバター画像をアップロードしました');
      location.reload();
    } else {
      alert('アップロード失敗: ' + (data.error || '不明なエラー'));
    }
  })
  .catch(err => alert('エラーが発生しました: ' + err.message));
});
</script>
{% endblock %}
